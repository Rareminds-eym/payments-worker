name = "razorpay-api"
main = "src/index.ts"
compatibility_date = "2024-01-01"

# ============================================================================
# OBSERVABILITY
# ============================================================================

[observability]
enabled = true

# ============================================================================
# VARIABLES
# ============================================================================
# Non-secret vars only. All secrets are set via: npm run secrets:setup
# RAZORPAY_MODE is controlled by which key pair you vault (test vs live keys)

# Default (production) — used when deploying with: npm run deploy
[vars]
ENVIRONMENT = "production"

# Local — used automatically with: npm run dev (reads .dev.vars)
# [vars] is overridden by .dev.vars locally, no deploy for this
# ENVIRONMENT = "local"

# Development — wrangler deploy --env development
[env.development.vars]
ENVIRONMENT = "development"

# Staging — wrangler deploy --env staging
[env.staging.vars]
ENVIRONMENT = "staging"

# ============================================================================
# TRIGGERS
# ============================================================================

[triggers]
crons = ["0 * * * *"]

[env.development.triggers]
crons = ["0 * * * *"]

[env.staging.triggers]
crons = ["0 * * * *"]
