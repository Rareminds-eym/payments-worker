name = "razorpay-api"
main = "src/index.ts"
compatibility_date = "2025-03-20"

# ============================================================================
# LOCAL DEV
# ============================================================================
# wrangler dev reads .dev.vars automatically for secrets when --env-file is set.
# Port is also declared here as a fallback.

[dev]
port = 9003

# ============================================================================
# BINDINGS
# ============================================================================
# Run `npm run kv:create` once to provision, then paste the returned id below.

[[kv_namespaces]]
binding = "RATE_LIMIT_KV"
id = "REPLACE_WITH_KV_ID"
preview_id = "REPLACE_WITH_KV_PREVIEW_ID"

# ============================================================================
# OBSERVABILITY
# ============================================================================

[observability]
enabled = true

# ============================================================================
# VARIABLES
# ============================================================================
# Non-secret vars only. All secrets are set via: wrangler secret put

# Default (production) — used when deploying with: npm run deploy
[vars]
ENVIRONMENT = "production"

# ─── LOCAL DEV ONLY ──────────────────────────────────────────────────────────
# These vars are overridden by .dev.vars when wrangler dev loads it.
# If wrangler fails to load .dev.vars, these placeholders prevent silent failures.
# Real secrets for local dev go in .dev.vars (gitignored).
# NEVER put real production secrets here.

# Development — wrangler deploy --env development
[env.development.vars]
ENVIRONMENT = "development"

# Staging — wrangler deploy --env staging
[env.staging.vars]
ENVIRONMENT = "staging"

# ============================================================================
# TRIGGERS — removed (cron cleanup was a no-op with per-isolate in-memory store)
# ============================================================================
